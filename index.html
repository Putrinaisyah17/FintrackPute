<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinTrack - Modern Personal Finance</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Alpine & Tailwind -->
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Tailwind Configuration (Menggunakan Palet Warna Anda) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            100: '#dfe5eb', // Very Light Gray/Blue
                            200: '#d3dee6', // Light Grayish Blue
                            300: '#a8c3d9', // Light Blue
                            400: '#96b3cc', // Medium Light Blue
                            500: '#365178', // Dark Navy Blue (Primary)
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['DM Serif Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8f9fb; /* Very soft app background */
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 font-sans min-h-screen pb-28 relative" x-data="financeApp()">

    <!-- WRAPPER MOBILE -->
    <div class="max-w-md mx-auto bg-[#f8f9fb] min-h-screen relative shadow-sm">

        <!-- ================= DYNAMIC HEADER (For tabs other than Dashboard) ================= -->
        <header class="px-5 pt-8 pb-4 sticky top-0 bg-[#f8f9fb]/90 backdrop-blur-md z-30" x-show="activeTab !== 'dashboard'" style="display: none;">
            <div class="flex justify-between items-center">
                <button @click="activeTab = 'dashboard'" class="text-gray-800 p-2 -ml-2 active:scale-90 transition"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="text-lg font-bold text-gray-900 capitalize" x-text="activeTab === 'targets' ? 'Goals' : activeTab"></h2>
                <button class="text-gray-800 p-2 -mr-2"><i class="fa-solid fa-ellipsis"></i></button>
            </div>
        </header>

        <main class="px-5 pb-6">
            
            <!-- ================= DASHBOARD TAB ================= -->
            <div x-show="activeTab === 'dashboard'" class="space-y-6 pt-6">
                
                <!-- Dashboard Header -->
                <div class="flex justify-between items-center mb-6">
                    <button class="text-gray-800 text-xl"><i class="fa-solid fa-bars"></i></button>
                    <div class="relative">
                        <button class="text-gray-800 text-xl"><i class="fa-regular fa-bell"></i></button>
                        <div class="absolute top-0.5 right-0 w-2.5 h-2.5 bg-brand-500 border-2 border-[#f8f9fb] rounded-full"></div>
                    </div>
                </div>

                <!-- Greeting -->
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <img src="https://ui-avatars.com/api/?name=User&background=365178&color=fff" class="w-7 h-7 rounded-full">
                        <p class="text-sm font-semibold text-gray-800">Hi, Olivia 👋</p>
                    </div>
                    <h1 class="text-[32px] font-serif leading-tight text-gray-900">Good morning!</h1>
                    <p class="text-sm text-gray-500 mt-1">Here's your financial overview</p>
                </div>

                <!-- Main Balance Card (Dark Blue Palette) -->
                <div class="bg-brand-500 text-white rounded-[28px] p-6 shadow-[0_8px_30px_rgba(54,81,120,0.3)] relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start">
                            <p class="text-sm text-brand-200 font-medium">Total Balance</p>
                            <button class="text-brand-300 hover:text-white"><i class="fa-regular fa-eye"></i></button>
                        </div>
                        <h2 class="text-4xl font-bold mt-2 tracking-tight" x-text="formatIDR(getNetCashFlow())"></h2>
                        <p class="text-xs font-medium text-brand-300 mt-2 flex items-center gap-1">
                            <i class="fa-solid fa-arrow-trend-up"></i> + 12.5% vs last month
                        </p>
                    </div>
                    <!-- Decorative SVG Wave -->
                    <svg class="absolute bottom-0 left-0 w-full h-24 text-brand-400 opacity-30" preserveAspectRatio="none" viewBox="0 0 1440 320">
                        <path fill="currentColor" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,160C672,160,768,192,864,197.3C960,203,1056,181,1152,165.3C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                    </svg>
                </div>

                <!-- Quick Actions -->
                <div class="flex justify-between px-2 pt-2">
                    <button @click="openModalWith('Transfer')" class="flex flex-col items-center gap-2 group active:scale-95 transition">
                        <div class="w-14 h-14 rounded-full bg-white shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-brand-500 flex items-center justify-center text-xl group-hover:bg-brand-50">
                            <i class="fa-solid fa-arrow-up-long"></i>
                        </div>
                        <span class="text-xs font-semibold text-gray-600">Send</span>
                    </button>
                    <button @click="openModalWith('Income')" class="flex flex-col items-center gap-2 group active:scale-95 transition">
                        <div class="w-14 h-14 rounded-full bg-white shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-brand-500 flex items-center justify-center text-xl group-hover:bg-brand-50">
                            <i class="fa-solid fa-arrow-down-long"></i>
                        </div>
                        <span class="text-xs font-semibold text-gray-600">Receive</span>
                    </button>
                    <button @click="openModalWith('Expense')" class="flex flex-col items-center gap-2 group active:scale-95 transition">
                        <div class="w-14 h-14 rounded-full bg-white shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-brand-500 flex items-center justify-center text-xl group-hover:bg-brand-50">
                            <i class="fa-solid fa-ellipsis"></i>
                        </div>
                        <span class="text-xs font-semibold text-gray-600">More</span>
                    </button>
                </div>

                <!-- Quick Overview List -->
                <div class="pt-2">
                    <div class="flex justify-between items-center mb-4 px-1">
                        <h3 class="font-bold text-gray-900 text-lg">Quick Overview</h3>
                        <button class="text-xs font-semibold text-gray-500 bg-white px-3 py-1.5 rounded-full shadow-sm">This Month <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i></button>
                    </div>
                    
                    <div class="bg-white rounded-3xl p-3 shadow-[0_4px_20px_rgba(0,0,0,0.02)] space-y-1">
                        <div class="flex justify-between items-center p-3 rounded-2xl hover:bg-gray-50 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-sm"><i class="fa-solid fa-arrow-up-right-dots"></i></div>
                                <p class="font-bold text-gray-800 text-sm">Income</p>
                            </div>
                            <p class="font-bold text-gray-900 text-sm" x-text="formatIDR(getTotalIncome())"></p>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-2xl hover:bg-gray-50 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center text-sm"><i class="fa-solid fa-arrow-down-right-dots"></i></div>
                                <p class="font-bold text-gray-800 text-sm">Expenses</p>
                            </div>
                            <p class="font-bold text-gray-900 text-sm" x-text="formatIDR(getTotalExpenses())"></p>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-2xl hover:bg-gray-50 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-brand-100 text-brand-500 flex items-center justify-center text-sm"><i class="fa-solid fa-piggy-bank"></i></div>
                                <p class="font-bold text-gray-800 text-sm">Savings</p>
                            </div>
                            <p class="font-bold text-gray-900 text-sm" x-text="formatIDR(getTotalSavings())"></p>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-2xl hover:bg-gray-50 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-sm"><i class="fa-solid fa-chart-pie"></i></div>
                                <p class="font-bold text-gray-800 text-sm">Investments</p>
                            </div>
                            <p class="font-bold text-gray-900 text-sm" x-text="formatIDR(getTotalInvestments())"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ================= TRANSACTIONS TAB ================= -->
            <div x-show="activeTab === 'transactions'" class="space-y-4 pt-2">
                
                <!-- Search & Filters -->
                <div class="relative mb-4">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" placeholder="Search transactions" class="w-full bg-white py-3 pl-10 pr-4 rounded-2xl text-sm font-medium shadow-[0_4px_20px_rgba(0,0,0,0.02)] focus:outline-none focus:ring-2 focus:ring-brand-200">
                </div>

                <div class="flex bg-white p-1.5 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.02)] mb-6">
                    <template x-for="filter in ['All', 'Income', 'Expense']" :key="filter">
                        <button @click="txFilter = filter" 
                                :class="txFilter === filter ? 'bg-brand-500 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'"
                                class="flex-1 py-2 text-center text-xs font-bold rounded-full transition" x-text="filter"></button>
                    </template>
                </div>

                <!-- Transaction List -->
                <div class="bg-white rounded-3xl p-3 shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                    <template x-for="tx in filteredTransactions" :key="tx.id">
                        <div class="p-3 flex justify-between items-center rounded-2xl hover:bg-gray-50 cursor-pointer transition mb-1" @click="editTransaction(tx)">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-sm" :class="getTxBg(tx.type)">
                                    <i :class="getTxIcon(tx.type)"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-sm text-gray-900" x-text="tx.subCategory || tx.mainCategory"></p>
                                    <p class="text-xs text-gray-400 font-medium mt-0.5" x-text="tx.account + ' • ' + formatDate(tx.date)"></p>
                                </div>
                            </div>
                            <p class="font-bold text-sm" :class="getTxColor(tx.type)" x-text="(tx.type === 'Expense' ? '-' : '+') + formatIDR(tx.amount)"></p>
                        </div>
                    </template>
                    <template x-if="filteredTransactions.length === 0">
                        <div class="text-center py-10">
                            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3 text-gray-300 text-2xl"><i class="fa-solid fa-receipt"></i></div>
                            <p class="text-gray-400 text-sm font-medium">No transactions found.</p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ================= SAVINGS GOALS TAB ================= -->
            <div x-show="activeTab === 'targets'" class="space-y-4 pt-2">
                <div class="flex justify-between items-center mb-2 px-1">
                    <h3 class="font-bold text-gray-900 text-lg">My Goals</h3>
                    <button @click="openModal('saving')" class="text-sm font-bold text-brand-500"><i class="fa-solid fa-plus mr-1"></i> Add Goal</button>
                </div>

                <div class="space-y-4">
                    <template x-for="goal in savingsGoals" :key="goal.id">
                        <div class="bg-white p-5 rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.02)] relative">
                            <button @click="deleteSavingGoal(goal.id)" class="absolute top-5 right-5 w-8 h-8 rounded-full bg-gray-50 text-gray-400 hover:text-rose-500 flex items-center justify-center transition active:scale-90">
                                <i class="fa-solid fa-trash text-xs"></i>
                            </button>
                            
                            <div class="flex items-center gap-4 mb-5">
                                <div class="w-12 h-12 rounded-full bg-brand-50 text-brand-500 flex items-center justify-center text-xl shadow-sm">
                                    <i class="fa-solid fa-bullseye"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-900 text-base" x-text="goal.name"></h4>
                                    <p class="text-xs text-gray-400 font-medium mt-0.5" x-text="formatIDR(goal.target)"></p>
                                </div>
                            </div>

                            <div class="w-full bg-gray-100 rounded-full h-2.5 mb-3">
                                <div class="bg-brand-500 h-2.5 rounded-full" :style="'width: ' + (goal.target > 0 ? Math.min((goal.current / goal.target) * 100, 100) : 0) + '%'"></div>
                            </div>
                            
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-brand-500" x-text="formatIDR(goal.current) + ' / ' + formatIDR(goal.target)"></span>
                                <span class="text-xs font-bold text-gray-400" x-text="(goal.target > 0 ? Math.round((goal.current / goal.target) * 100) : 0) + '%'"></span>
                            </div>
                        </div>
                    </template>
                    <template x-if="savingsGoals.length === 0">
                        <div class="text-center py-10 bg-white rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                            <p class="text-gray-400 text-sm font-medium">No savings goals added yet.</p>
                            <button @click="openModal('saving')" class="mt-4 px-5 py-2 bg-brand-50 text-brand-500 rounded-full font-bold text-sm">Create One</button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ================= ACCOUNTS / BUDGETS TAB ================= -->
            <div x-show="activeTab === 'accounts'" class="space-y-4 pt-2">
                <div class="bg-white rounded-[28px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-900 text-lg">Bank Balances</h3>
                    </div>
                    <div class="space-y-4">
                        <template x-for="acc in Object.keys(accounts)" :key="acc">
                            <div class="flex justify-between items-center pb-4 border-b border-gray-50 last:border-0 last:pb-0">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-sm shadow-inner"><i class="fa-solid fa-building-columns"></i></div>
                                    <div>
                                        <h4 class="font-bold text-gray-900 text-sm" x-text="acc"></h4>
                                        <p class="text-[10px] text-gray-400 font-medium mt-0.5">Account</p>
                                    </div>
                                </div>
                                <p class="font-bold text-gray-900 text-sm" x-text="formatIDR(accounts[acc].balance)"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- ================= REPORTS TAB ================= -->
            <div x-show="activeTab === 'reports'" class="space-y-4 pt-2">
                <div class="bg-white p-6 rounded-[28px] shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                    <h3 class="font-bold text-gray-900 text-lg mb-6">Spending Overview</h3>
                    <div class="space-y-5">
                        <template x-for="cat in Object.keys(getExpenseByCategory())" :key="cat">
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <div class="flex items-center gap-2">
                                        <div class="w-2.5 h-2.5 rounded-full bg-brand-500"></div>
                                        <span class="text-sm font-bold text-gray-800" x-text="cat"></span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-sm font-bold text-gray-900" x-text="formatIDR(getExpenseByCategory()[cat])"></span>
                                        <span class="text-xs font-semibold text-gray-400 ml-2" x-text="Math.round((getExpenseByCategory()[cat] / getTotalExpenses() * 100) || 0) + '%'"></span>
                                    </div>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-2">
                                    <div class="bg-brand-500 h-2 rounded-full" :style="'width: ' + (getTotalExpenses() > 0 ? (getExpenseByCategory()[cat] / getTotalExpenses() * 100) : 0) + '%'"></div>
                                </div>
                            </div>
                        </template>
                        <template x-if="Object.keys(getExpenseByCategory()).length === 0">
                            <p class="text-sm text-gray-400 font-medium text-center py-4">No expenses recorded yet.</p>
                        </template>
                    </div>
                </div>
            </div>

        </main>

        <!-- ================= BOTTOM NAVIGATION ================= -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-4 flex justify-between items-center z-40 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.03)] max-w-md mx-auto">
            <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'text-brand-500' : 'text-gray-300 hover:text-gray-400'" class="flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button @click="activeTab = 'transactions'" :class="activeTab === 'transactions' ? 'text-brand-500' : 'text-gray-300 hover:text-gray-400'" class="flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-receipt text-xl"></i>
                <span class="text-[10px] font-bold">History</span>
            </button>
            <button @click="activeTab = 'accounts'" :class="activeTab === 'accounts' ? 'text-brand-500' : 'text-gray-300 hover:text-gray-400'" class="flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-bold">Budgets</span>
            </button>
            <button @click="activeTab = 'targets'" :class="activeTab === 'targets' ? 'text-brand-500' : 'text-gray-300 hover:text-gray-400'" class="flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-bullseye text-xl"></i>
                <span class="text-[10px] font-bold">Goals</span>
            </button>
            <button @click="activeTab = 'reports'" :class="activeTab === 'reports' ? 'text-brand-500' : 'text-gray-300 hover:text-gray-400'" class="flex flex-col items-center gap-1 transition">
                <i class="fa-regular fa-user text-xl"></i>
                <span class="text-[10px] font-bold">Profile</span>
            </button>
        </nav>

        <!-- ================= MODALS ================= -->
        <!-- 1. Transaction Form Modal -->
        <div x-show="modals.transaction" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-end justify-center" x-transition style="display: none;">
            <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 space-y-5 max-h-[90vh] overflow-y-auto shadow-2xl">
                <div class="flex justify-between items-center pb-2">
                    <h3 class="font-bold text-xl text-gray-900" x-text="form.tx.id ? 'Edit Transaction' : 'Add Transaction'"></h3>
                    <button @click="closeModal('transaction')" class="w-8 h-8 bg-gray-100 rounded-full text-gray-500 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="flex bg-[#f8f9fb] p-1.5 rounded-full shadow-inner">
                    <template x-for="type in ['Income', 'Expense', 'Transfer']" :key="type">
                        <button @click="form.tx.type = type; updateCategories();" 
                                :class="form.tx.type === type ? 'bg-white text-brand-500 shadow-sm' : 'text-gray-500'"
                                class="flex-1 py-2.5 text-center text-xs font-bold rounded-full transition" x-text="type"></button>
                    </template>
                </div>

                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Amount (IDR)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 font-bold text-gray-400">Rp</span>
                            <input type="number" x-model.number="form.tx.amount" class="w-full bg-[#f8f9fb] border-none py-3.5 pl-12 pr-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 text-lg font-bold text-brand-500" placeholder="0">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Date</label>
                            <input type="date" x-model="form.tx.date" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Account</label>
                            <select x-model="form.tx.account" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700 appearance-none">
                                <template x-for="acc in Object.keys(accounts)" :key="acc">
                                    <option :value="acc" x-text="acc"></option>
                                </template>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3" x-show="form.tx.type === 'Income' || form.tx.type === 'Expense'">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Category</label>
                            <select x-model="form.tx.mainCategory" @change="updateSubCategories()" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700 appearance-none">
                                <template x-for="cat in Object.keys(categories[form.tx.type.toLowerCase() || 'expense'])" :key="cat">
                                    <option :value="cat" x-text="cat"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Sub Category</label>
                            <select x-model="form.tx.subCategory" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700 appearance-none">
                                <option value="">None</option>
                                <template x-for="sub in subCategoriesList" :key="sub">
                                    <option :value="sub" x-text="sub"></option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <div x-show="form.tx.type === 'Transfer'">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Transfer To</label>
                        <select x-model="form.tx.transferTo" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700 appearance-none">
                            <template x-for="acc in Object.keys(accounts)" :key="acc">
                                <option :value="acc" x-text="acc" :disabled="acc === form.tx.account"></option>
                            </template>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Notes</label>
                        <input type="text" x-model="form.tx.notes" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700" placeholder="Optional notes...">
                    </div>
                </div>

                <button @click="saveTransaction()" class="w-full bg-brand-500 text-white font-bold p-4 rounded-2xl shadow-[0_8px_20px_rgba(54,81,120,0.25)] active:scale-95 transition mt-2">Save Entry</button>
            </div>
        </div>

        <!-- 2. Savings Goal Modal -->
        <div x-show="modals.saving" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-end justify-center" x-transition style="display: none;">
            <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 space-y-5 shadow-2xl">
                <div class="flex justify-between items-center pb-2">
                    <h3 class="font-bold text-xl text-gray-900">Add Savings Goal</h3>
                    <button @click="closeModal('saving')" class="w-8 h-8 bg-gray-100 rounded-full text-gray-500 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Goal Name</label>
                        <input type="text" x-model="form.saving.name" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700" placeholder="e.g., Vacation">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Target Amount (IDR)</label>
                        <input type="number" x-model.number="form.saving.target" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Initial Funded Amount (IDR)</label>
                        <input type="number" x-model.number="form.saving.current" class="w-full bg-[#f8f9fb] border-none p-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-200 font-medium text-gray-700" placeholder="0">
                    </div>
                </div>
                <button @click="saveSavingGoal()" class="w-full bg-brand-500 text-white font-bold p-4 rounded-2xl shadow-[0_8px_20px_rgba(54,81,120,0.25)] mt-2">Save Goal</button>
            </div>
        </div>

    </div>

    <!-- CORE LOGIC ENGINE -->
    <script>
        function financeApp() {
            return {
                activeTab: 'dashboard',
                txFilter: 'All', // Added filter state
                modals: { transaction: false, saving: false },
                
                categories: {
                    expense: {
                        "Food & Dining": ["Breakfast", "Lunch", "Dinner", "Coffee", "Snacks"],
                        "Transport": ["Fuel", "Parking", "Public Transport", "Online Taxi"],
                        "Shopping": ["Clothes", "Beauty", "Electronics"],
                        "Bills": ["Electricity", "Water", "Internet", "Phone"],
                        "Health": ["Medicine", "Doctor"],
                        "Entertainment": ["Movies", "Games", "Subscriptions"],
                        "Others": []
                    },
                    income: {
                        "Salary": [], "Bonus": [], "Freelance": [], "Investment Return": [], "Other Income": []
                    }
                },

                accounts: {
                    BCA: { balance: 0 },
                    "Allo Bank": { balance: 0 },
                    Mandiri: { balance: 0 },
                    Blu: { balance: 0 },
                    Jago: { balance: 0 }
                },
                transactions: [],
                savingsGoals: [],
                investments: [],

                subCategoriesList: [],
                form: {
                    tx: { id: null, type: 'Expense', amount: '', date: '', account: 'BCA', mainCategory: '', subCategory: '', transferTo: 'Allo Bank', notes: '' },
                    saving: { name: '', target: '', current: '' }
                },

                init() {
                    if (localStorage.getItem('fintrack_txs')) this.transactions = JSON.parse(localStorage.getItem('fintrack_txs'));
                    if (localStorage.getItem('fintrack_savings')) this.savingsGoals = JSON.parse(localStorage.getItem('fintrack_savings'));
                    this.resetForms();
                    this.recalculateBalances();
                },

                formatIDR(num) {
                    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);
                },
                formatDate(dateStr) {
                    if (!dateStr) return '';
                    return new Date(dateStr).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
                },

                openModal(type) { this.modals[type] = true; },
                openModalWith(type) {
                    this.resetForms();
                    this.form.tx.type = type;
                    this.updateCategories();
                    this.openModal('transaction');
                },
                closeModal(type) { this.modals[type] = false; this.resetForms(); },
                
                resetForms() {
                    const today = new Date().toISOString().split('T')[0];
                    this.form.tx = { id: null, type: 'Expense', amount: '', date: today, account: 'BCA', mainCategory: '', subCategory: '', transferTo: 'Allo Bank', notes: '' };
                    this.form.saving = { name: '', target: '', current: '' };
                    this.updateCategories();
                },
                updateCategories() {
                    const type = this.form.tx.type.toLowerCase();
                    if(type === 'expense' || type === 'income') {
                        this.form.tx.mainCategory = Object.keys(this.categories[type])[0];
                        this.updateSubCategories();
                    }
                },
                updateSubCategories() {
                    const type = this.form.tx.type.toLowerCase();
                    if(type === 'expense' || type === 'income') {
                        this.subCategoriesList = this.categories[type][this.form.tx.mainCategory] || [];
                        this.form.tx.subCategory = this.subCategoriesList[0] || '';
                    }
                },

                get filteredTransactions() {
                    if (this.txFilter === 'Income') return this.transactions.filter(t => t.type === 'Income');
                    if (this.txFilter === 'Expense') return this.transactions.filter(t => t.type === 'Expense');
                    return this.transactions;
                },

                saveTransaction() {
                    if (!this.form.tx.amount) return alert('Please input amount');
                    if (this.form.tx.id) {
                        const index = this.transactions.findIndex(t => t.id === this.form.tx.id);
                        if (index !== -1) this.transactions[index] = { ...this.form.tx };
                    } else {
                        this.form.tx.id = Date.now();
                        this.transactions.unshift({ ...this.form.tx });
                    }
                    this.persistAndRefresh();
                    this.closeModal('transaction');
                },
                deleteTransaction(id) {
                    this.transactions = this.transactions.filter(t => t.id !== id);
                    this.persistAndRefresh();
                },
                editTransaction(tx) {
                    this.form.tx = { ...tx };
                    const type = this.form.tx.type.toLowerCase();
                    if(type === 'expense' || type === 'income') {
                        this.subCategoriesList = this.categories[type][this.form.tx.mainCategory] || [];
                    }
                    this.openModal('transaction');
                },
                
                saveSavingGoal() {
                    if(!this.form.saving.name || !this.form.saving.target) return alert('Please fill required fields');
                    this.savingsGoals.push({
                        id: Date.now(),
                        name: this.form.saving.name,
                        target: Number(this.form.saving.target),
                        current: Number(this.form.saving.current) || 0
                    });
                    localStorage.setItem('fintrack_savings', JSON.stringify(this.savingsGoals));
                    this.closeModal('saving');
                },
                deleteSavingGoal(id) {
                    if(confirm('Delete this goal?')) {
                        this.savingsGoals = this.savingsGoals.filter(g => g.id !== id);
                        localStorage.setItem('fintrack_savings', JSON.stringify(this.savingsGoals));
                    }
                },

                persistAndRefresh() {
                    localStorage.setItem('fintrack_txs', JSON.stringify(this.transactions));
                    this.recalculateBalances();
                },

                recalculateBalances() {
                    for (let acc in this.accounts) { this.accounts[acc].balance = 0; }
                    this.transactions.slice().reverse().forEach(tx => {
                        const amt = Number(tx.amount);
                        if (tx.type === 'Income' && this.accounts[tx.account]) this.accounts[tx.account].balance += amt;
                        else if (tx.type === 'Expense' && this.accounts[tx.account]) this.accounts[tx.account].balance -= amt;
                        else if (tx.type === 'Transfer') {
                            if(this.accounts[tx.account]) this.accounts[tx.account].balance -= amt;
                            if(this.accounts[tx.transferTo]) this.accounts[tx.transferTo].balance += amt;
                        }
                    });
                },

                getTotalIncome() { return this.transactions.filter(t => t.type === 'Income').reduce((sum, t) => sum + Number(t.amount), 0); },
                getTotalExpenses() { return this.transactions.filter(t => t.type === 'Expense').reduce((sum, t) => sum + Number(t.amount), 0); },
                getNetCashFlow() { return this.getTotalIncome() - this.getTotalExpenses(); },
                getTotalSavings() { return this.savingsGoals.reduce((sum, g) => sum + Number(g.current), 0); },
                getTotalInvestments() { return 0; /* Deprecated in new UI mockup, kept for logic safe */ },

                getExpenseByCategory() {
                    let map = {};
                    this.transactions.filter(t => t.type === 'Expense').forEach(t => {
                        map[t.mainCategory] = (map[t.mainCategory] || 0) + Number(t.amount);
                    });
                    return map;
                },

                getTxColor(type) {
                    return { Income: 'text-emerald-500', Expense: 'text-gray-900', Transfer: 'text-brand-500' }[type];
                },
                getTxBg(type) {
                    return { Income: 'bg-emerald-50 text-emerald-500', Expense: 'bg-rose-50 text-rose-500', Transfer: 'bg-brand-50 text-brand-500' }[type];
                },
                getTxIcon(type) {
                    return { Income: 'fa-solid fa-arrow-down', Expense: 'fa-solid fa-arrow-up', Transfer: 'fa-solid fa-right-left' }[type];
                }
            }
        }
    </script>
</body>
</html>
